services:
  prism-insight:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prism-insight-container
    image: prism-insight:latest

    # 환경 변수
    environment:
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
      - ENABLE_CRON=true  # Set to 'false' to disable cron jobs

    # 볼륨 마운트
    volumes:
      # 프로젝트 루트 디렉토리 마운트 (stale inode 문제 해결)
      # 개별 파일 마운트 시 에디터의 write-temp+rename 패턴으로
      # Docker가 새 inode를 추적하지 못하는 문제 방지
      - .:/app/prism-insight

      # Claude Code Max Plan 인증 토큰 공유
      - ~/.claude:/root/.claude:ro

      # 데이터 영속성 (named volume이 bind mount 위에 오버레이됨)
      - prism-data:/app/prism-insight/data

    # 작업 디렉토리
    working_dir: /app/prism-insight

    # Entrypoint가 컨테이너를 유지 (cron 서비스 실행)
    # 수동 실행 시: docker-compose run prism-insight python3 script.py

    # 재시작 정책
    restart: unless-stopped

    # 네트워크 모드
    network_mode: bridge

    # 헬스체크
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import sys; sys.exit(0)' && service cron status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# 볼륨 정의
volumes:
  prism-data:
    driver: local
